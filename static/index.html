<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>YOUTUBE</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --red: #FF0000; --bg: #090909; --surf: #111; --border: #1f1f1f;
      --text: #efefef; --muted: #555;
    }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif;
      min-height: 100vh; display: flex; flex-direction: column; align-items: center;
      padding: 48px 24px 80px;
      background-image: linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);
      background-size: 40px 40px;
    }

    header { width:100%; max-width:960px; display:flex; align-items:flex-end; justify-content:space-between; margin-bottom:28px; animation:fadeUp .5s ease both; }
    .logo { font-family:'Bebas Neue',sans-serif; font-size:clamp(52px,9vw,88px); letter-spacing:.04em; line-height:1; }
    .logo span { color:var(--red); }
    .badge { font-family:'DM Mono',monospace; font-size:11px; letter-spacing:.12em; color:var(--muted); text-transform:uppercase; padding-bottom:4px; }

    /* no-yt badge */
    .no-yt { display:flex; align-items:center; gap:6px; background:rgba(255,0,0,.08); border:1px solid rgba(255,0,0,.2); border-radius:4px; padding:5px 12px; font-family:'DM Mono',monospace; font-size:10px; letter-spacing:.1em; color:var(--red); }
    .no-yt::before { content:'●'; animation: blink 1.5s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

    .search-row { width:100%; max-width:960px; display:flex; gap:10px; margin-bottom:12px; animation:fadeUp .5s .08s ease both; }
    .search-input { flex:1; background:var(--surf); border:1px solid var(--border); border-radius:4px; color:var(--text); font-family:'DM Mono',monospace; font-size:13px; padding:12px 16px; outline:none; transition:border-color .2s,box-shadow .2s; }
    .search-input::placeholder { color:var(--muted); }
    .search-input:focus { border-color:var(--red); box-shadow:0 0 0 2px rgba(255,0,0,.1); }
    .search-btn { background:var(--red); color:#fff; border:none; border-radius:4px; font-family:'Bebas Neue',sans-serif; font-size:18px; letter-spacing:.08em; padding:0 28px; cursor:pointer; transition:background .15s,transform .1s; white-space:nowrap; }
    .search-btn:hover { background:#d90000; }
    .search-btn:active { transform:scale(.97); }
    .search-btn:disabled { background:var(--muted); cursor:not-allowed; }

    .type-toggle { width:100%; max-width:960px; display:flex; gap:8px; margin-bottom:14px; animation:fadeUp .5s .14s ease both; }
    .toggle-btn { display:flex; align-items:center; gap:7px; background:var(--surf); border:1px solid var(--border); border-radius:4px; color:var(--muted); font-family:'DM Mono',monospace; font-size:12px; letter-spacing:.08em; padding:8px 18px; cursor:pointer; transition:border-color .2s,color .2s,background .2s; }
    .toggle-btn:hover { border-color:#333; color:var(--text); }
    .toggle-btn.active { border-color:var(--red); color:var(--text); background:rgba(255,0,0,.08); }

    .error-msg { width:100%; max-width:960px; font-family:'DM Mono',monospace; font-size:12px; color:var(--red); letter-spacing:.06em; min-height:20px; margin-bottom:8px; }

    .spinner { display:none; width:100%; max-width:960px; justify-content:center; padding:20px 0; }
    .spinner.show { display:flex; }
    .spinner::after { content:''; width:22px; height:22px; border:2px solid var(--border); border-top-color:var(--red); border-radius:50%; animation:spin .7s linear infinite; }

    .results-grid { width:100%; max-width:960px; display:grid; gap:12px; margin-bottom:20px; }
    .results-grid.mode-video { grid-template-columns:repeat(4,1fr); }
    .results-grid.mode-short { grid-template-columns:repeat(5,1fr); }
    @media(max-width:700px){ .results-grid.mode-video{grid-template-columns:repeat(2,1fr)} .results-grid.mode-short{grid-template-columns:repeat(3,1fr)} }

    .result-card { background:var(--surf); border:1px solid var(--border); border-radius:6px; overflow:hidden; cursor:pointer; transition:border-color .2s,transform .15s,box-shadow .2s; animation:fadeUp .3s ease both; }
    .result-card:hover { border-color:var(--red); transform:translateY(-3px); box-shadow:0 8px 28px rgba(0,0,0,.55); }
    .thumb-wrap { width:100%; background:var(--border); overflow:hidden; position:relative; }
    .mode-video .thumb-wrap { aspect-ratio:16/9; }
    .mode-short .thumb-wrap { aspect-ratio:9/16; }
    .thumb-wrap img { width:100%; height:100%; object-fit:cover; display:block; transition:transform .3s; }
    .result-card:hover .thumb-wrap img { transform:scale(1.05); }
    .thumb-wrap::after { content:'▶'; position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:20px; color:#fff; background:rgba(0,0,0,.35); opacity:0; transition:opacity .2s; }
    .result-card:hover .thumb-wrap::after { opacity:1; }
    .shorts-badge { position:absolute; top:6px; left:6px; background:var(--red); color:#fff; font-family:'DM Mono',monospace; font-size:9px; letter-spacing:.08em; padding:2px 6px; border-radius:3px; }
    .result-info { padding:9px 11px 11px; }
    .result-title { font-size:12px; font-weight:500; line-height:1.45; margin-bottom:4px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
    .result-channel { font-family:'DM Mono',monospace; font-size:10px; color:var(--muted); letter-spacing:.06em; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

    .load-more-wrap { width:100%; max-width:960px; display:none; justify-content:center; margin-bottom:28px; }
    .load-more-wrap.show { display:flex; }
    .load-more-btn { background:transparent; border:1px solid var(--border); border-radius:4px; color:var(--muted); font-family:'DM Mono',monospace; font-size:12px; letter-spacing:.1em; padding:10px 32px; cursor:pointer; transition:border-color .2s,color .2s,background .2s; }
    .load-more-btn:hover { border-color:var(--red); color:var(--text); background:rgba(255,0,0,.06); }
    .load-more-btn:disabled { opacity:.4; cursor:not-allowed; }

    /* ── Player ── */
    .player-wrap { width:100%; max-width:960px; animation:fadeUp .5s .2s ease both; }
    .player-box { width:100%; aspect-ratio:16/9; border:1px solid var(--border); border-radius:6px; background:var(--surf); overflow:hidden; position:relative; }

    .placeholder { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; color:var(--muted); pointer-events:none; transition:opacity .3s; }
    .placeholder svg { width:56px; height:56px; opacity:.22; }
    .placeholder p { font-family:'DM Mono',monospace; font-size:11px; letter-spacing:.1em; text-transform:uppercase; }

    /* loading overlay */
    .player-loading {
      position:absolute; inset:0; display:none; flex-direction:column;
      align-items:center; justify-content:center; gap:14px;
      background:var(--surf); z-index:2;
    }
    .player-loading.show { display:flex; }
    .player-loading-ring { width:36px; height:36px; border:3px solid var(--border); border-top-color:var(--red); border-radius:50%; animation:spin .7s linear infinite; }
    .player-loading-text { font-family:'DM Mono',monospace; font-size:11px; letter-spacing:.12em; color:var(--muted); text-transform:uppercase; }

    /* native video */
    .player-box video {
      position:absolute; inset:0; width:100%; height:100%;
      background:#000; opacity:0; transition:opacity .4s;
    }
    .player-box video.visible { opacity:1; }

    /* custom controls bar */
    .controls {
      position:absolute; bottom:0; left:0; right:0;
      display:none; align-items:center; gap:10px;
      background:linear-gradient(transparent,rgba(0,0,0,.8));
      padding:18px 14px 10px;
      opacity:0; transition:opacity .25s;
    }
    .player-box:hover .controls { opacity:1; }
    .controls.visible { display:flex; }

    .ctrl-btn { background:none; border:none; color:#fff; cursor:pointer; font-size:16px; padding:4px; line-height:1; flex-shrink:0; }
    .ctrl-btn:hover { color:var(--red); }

    .progress-wrap { flex:1; height:4px; background:rgba(255,255,255,.2); border-radius:2px; cursor:pointer; position:relative; }
    .progress-fill { height:100%; background:var(--red); border-radius:2px; width:0%; pointer-events:none; transition:width .1s linear; }
    .progress-wrap:hover { height:6px; }

    .time-label { font-family:'DM Mono',monospace; font-size:10px; color:rgba(255,255,255,.7); white-space:nowrap; }
    .vol-input { width:60px; accent-color:var(--red); cursor:pointer; }

    .meta-bar { display:flex; align-items:center; justify-content:space-between; margin-top:12px; padding:0 2px; }
    .video-id-tag { font-family:'DM Mono',monospace; font-size:11px; color:var(--muted); letter-spacing:.1em; }
    .video-id-tag span { color:var(--red); }
    .now-playing-title { font-family:'DM Mono',monospace; font-size:11px; color:var(--muted); letter-spacing:.06em; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:60%; }

    @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    @keyframes spin   { to{transform:rotate(360deg)} }
  </style>
</head>
<body>

  <header>
    <h1 class="logo">YOU<span>TUBE</span></h1>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;padding-bottom:4px">
      <p class="badge">Embedded Viewer / v4.0</p>
      <div class="no-yt">ZERO youtube.com CONTACT</div>
    </div>
  </header>

  <div class="search-row">
    <input id="searchInput" class="search-input" type="text"
      placeholder="검색어 입력 또는 YouTube URL 붙여넣기…"
      autocomplete="off" spellcheck="false"/>
    <button id="searchBtn" class="search-btn">SEARCH</button>
  </div>

  <div class="type-toggle">
    <button class="toggle-btn active" data-kind="video"><span>🎬</span> VIDEO</button>
    <button class="toggle-btn" data-kind="short"><span>⚡</span> SHORTS</button>
  </div>

  <p id="errorMsg" class="error-msg" aria-live="polite"></p>
  <div class="spinner" id="spinner"></div>
  <div class="results-grid mode-video" id="resultsGrid"></div>
  <div class="load-more-wrap" id="loadMoreWrap">
    <button class="load-more-btn" id="loadMoreBtn">LOAD MORE</button>
  </div>

  <!-- Player -->
  <div class="player-wrap">
    <div class="player-box" id="playerBox">
      <!-- Placeholder -->
      <div class="placeholder" id="placeholder">
        <svg viewBox="0 0 68 48" fill="none"><rect width="68" height="48" rx="10" fill="currentColor"/><path d="M27 16L47 24L27 32V16Z" fill="#090909"/></svg>
        <p>검색 후 영상을 선택하거나 URL을 붙여넣으세요</p>
      </div>

      <!-- Loading overlay (while yt-dlp extracts) -->
      <div class="player-loading" id="playerLoading">
        <div class="player-loading-ring"></div>
        <p class="player-loading-text">스트림 추출 중…</p>
      </div>

      <!-- Native video element -->
      <video id="mainVideo" preload="metadata"></video>

      <!-- Custom controls -->
      <div class="controls" id="controls">
        <button class="ctrl-btn" id="playPauseBtn" title="Play/Pause">▶</button>
        <span class="time-label" id="timeLabel">0:00 / 0:00</span>
        <div class="progress-wrap" id="progressWrap">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <input class="vol-input" id="volInput" type="range" min="0" max="1" step="0.05" value="1" title="Volume"/>
        <button class="ctrl-btn" id="fsBtn" title="Fullscreen">⛶</button>
      </div>
    </div>

    <div class="meta-bar">
      <p class="video-id-tag" id="videoIdTag">VIDEO_ID —</p>
      <p class="now-playing-title" id="nowPlayingTitle"></p>
    </div>
  </div>

  <script>
    const API_BASE = (location.hostname === '127.0.0.1' || location.hostname === 'localhost') ? 'http://127.0.0.1:8000' : '';

    const searchInput   = document.getElementById('searchInput');
    const searchBtn     = document.getElementById('searchBtn');
    const errorMsg      = document.getElementById('errorMsg');
    const spinner       = document.getElementById('spinner');
    const resultsGrid   = document.getElementById('resultsGrid');
    const loadMoreWrap  = document.getElementById('loadMoreWrap');
    const loadMoreBtn   = document.getElementById('loadMoreBtn');
    const playerBox     = document.getElementById('playerBox');
    const placeholder   = document.getElementById('placeholder');
    const playerLoading = document.getElementById('playerLoading');
    const mainVideo     = document.getElementById('mainVideo');
    const controls      = document.getElementById('controls');
    const playPauseBtn  = document.getElementById('playPauseBtn');
    const timeLabel     = document.getElementById('timeLabel');
    const progressWrap  = document.getElementById('progressWrap');
    const progressFill  = document.getElementById('progressFill');
    const volInput      = document.getElementById('volInput');
    const fsBtn         = document.getElementById('fsBtn');
    const videoIdTag    = document.getElementById('videoIdTag');
    const nowPlayingTitle = document.getElementById('nowPlayingTitle');
    const toggleBtns    = document.querySelectorAll('.toggle-btn');

    const URL_RE = /^(https?:\/\/|youtu\.?be)/i;
    const ID_RE  = /^[A-Za-z0-9_-]{11}$/;

    let currentKind   = 'video';
    let currentQuery  = '';
    let nextPageToken = null;

    // ── Type toggle ──────────────────────────────────────────
    toggleBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        if (btn.dataset.kind === currentKind) return;
        toggleBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentKind = btn.dataset.kind;
        resultsGrid.className = `results-grid mode-${currentKind}`;
        if (currentQuery) { clearResults(); searchVideos(currentQuery, false); }
      });
    });

    // ── Search ───────────────────────────────────────────────
    async function handleSearch() {
      const q = searchInput.value.trim();
      if (!q) { showError('검색어 또는 URL을 입력해 주세요.'); return; }
      clearError();
      if (URL_RE.test(q) || ID_RE.test(q)) {
        await loadByUrl(q);
      } else {
        currentQuery = q;
        clearResults();
        await searchVideos(q, false);
      }
    }

    async function searchVideos(q, append) {
      setSearchLoading(true);
      try {
        let url = `${API_BASE}/api/search?q=${encodeURIComponent(q)}&kind=${currentKind}`;
        if (append && nextPageToken) url += `&page_token=${encodeURIComponent(nextPageToken)}`;
        const res  = await fetch(url);
        const data = await res.json();
        if (!res.ok) { showError(data.detail || '검색 오류'); return; }
        nextPageToken = data.next_page_token || null;
        loadMoreWrap.classList.toggle('show', !!nextPageToken);
        renderResults(data.results, append);
      } catch { showError('서버 연결 실패'); }
      finally  { setSearchLoading(false); }
    }

    function renderResults(results, append) {
      if (!results.length && !append) { showError('검색 결과 없음'); return; }
      const isShort = currentKind === 'short';
      results.forEach((item, i) => {
        const card = document.createElement('div');
        card.className = 'result-card';
        card.style.animationDelay = `${i * 0.04}s`;
        const thumbSrc = `${API_BASE}/api/thumbnail/${item.video_id}`;
        card.innerHTML = `
          <div class="thumb-wrap">
            <img src="${thumbSrc}" alt="${esc(item.title)}" loading="lazy"/>
            ${isShort ? '<span class="shorts-badge">SHORTS</span>' : ''}
          </div>
          <div class="result-info">
            <p class="result-title">${esc(item.title)}</p>
            <p class="result-channel">${esc(item.channel)}</p>
          </div>`;
        card.addEventListener('click', () => loadStream(item.video_id));
        resultsGrid.appendChild(card);
      });
    }

    loadMoreBtn.addEventListener('click', () => {
      if (currentQuery && nextPageToken) searchVideos(currentQuery, true);
    });

    async function loadByUrl(url) {
      setSearchLoading(true);
      try {
        const res  = await fetch(`${API_BASE}/api/parse`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({url}) });
        const data = await res.json();
        if (!res.ok) { showError(data.detail); return; }
        clearResults();
        loadStream(data.video_id);
      } catch { showError('서버 연결 실패'); }
      finally  { setSearchLoading(false); }
    }

    // ── Stream loading ────────────────────────────────────────
    async function loadStream(videoId) {
      // Show loading state
      placeholder.style.opacity = '0';
      playerLoading.classList.add('show');
      mainVideo.classList.remove('visible');
      controls.classList.remove('visible');
      mainVideo.src = '';
      videoIdTag.innerHTML = `VIDEO_ID — <span>${videoId}</span>`;

      try {
        // Ask backend for stream URLs (yt-dlp extracts them server-side)
        const res  = await fetch(`${API_BASE}/api/stream-info/${videoId}`);
        const data = await res.json();
        if (!res.ok) { showError(data.detail || '스트림 추출 실패'); playerLoading.classList.remove('show'); return; }

        nowPlayingTitle.textContent = data.title;

        // Set src and show immediately — file is already downloaded server-side
        mainVideo.pause();
        mainVideo.removeAttribute('src');
        mainVideo.src = `${API_BASE}/api/stream/${videoId}`;
        mainVideo.load();

        playerLoading.classList.remove('show');
        placeholder.style.opacity = '0';
        mainVideo.classList.add('visible');
        controls.classList.add('visible');
        mainVideo.play().catch(() => {});
        playerBox.scrollIntoView({ behavior:'smooth', block:'center' });
      } catch (e) {
        showError('스트림 로드 실패: ' + e.message);
        playerLoading.classList.remove('show');
      }
    }

    // ── Video controls ────────────────────────────────────────
    function fmtTime(s) {
      if (isNaN(s)) return '0:00';
      const m = Math.floor(s / 60), sec = Math.floor(s % 60);
      return `${m}:${sec.toString().padStart(2,'0')}`;
    }

    mainVideo.addEventListener('timeupdate', () => {
      const pct = mainVideo.duration ? (mainVideo.currentTime / mainVideo.duration) * 100 : 0;
      progressFill.style.width = pct + '%';
      timeLabel.textContent = `${fmtTime(mainVideo.currentTime)} / ${fmtTime(mainVideo.duration)}`;
    });

    mainVideo.addEventListener('play',  () => { playPauseBtn.textContent = '⏸'; });
    mainVideo.addEventListener('pause', () => { playPauseBtn.textContent = '▶'; });
    mainVideo.addEventListener('ended', () => { playPauseBtn.textContent = '↩'; });

    playPauseBtn.addEventListener('click', () => {
      if (mainVideo.paused || mainVideo.ended) mainVideo.play();
      else mainVideo.pause();
    });

    progressWrap.addEventListener('click', e => {
      const rect = progressWrap.getBoundingClientRect();
      const pct  = (e.clientX - rect.left) / rect.width;
      mainVideo.currentTime = pct * mainVideo.duration;
    });

    volInput.addEventListener('input', () => { mainVideo.volume = volInput.value; });

    fsBtn.addEventListener('click', () => {
      if (!document.fullscreenElement) playerBox.requestFullscreen();
      else document.exitFullscreen();
    });

    // ── Helpers ───────────────────────────────────────────────
    function clearResults() { resultsGrid.innerHTML = ''; nextPageToken = null; loadMoreWrap.classList.remove('show'); }
    function showError(msg) { errorMsg.textContent = '⚠ ' + msg; }
    function clearError()   { errorMsg.textContent = ''; }
    function setSearchLoading(on) { spinner.classList.toggle('show',on); searchBtn.disabled=on; searchBtn.textContent=on?'LOADING…':'SEARCH'; }
    function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    searchBtn.addEventListener('click', handleSearch);
    searchInput.addEventListener('keydown', e => { if(e.key==='Enter') handleSearch(); });
  </script>
</body>
</html>
