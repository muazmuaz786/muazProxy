<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>YOUTUBE</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--red:#FF0000;--bg:#090909;--surf:#111;--border:#1f1f1f;--text:#efefef;--muted:#555}
    body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:48px 24px 80px;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px}
    header{width:100%;max-width:960px;display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:28px}
    .logo{font-family:'Bebas Neue',sans-serif;font-size:clamp(52px,9vw,88px);letter-spacing:.04em;line-height:1}
    .logo span{color:var(--red)}
    .badge{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.12em;color:var(--muted);text-transform:uppercase}
    .search-row{width:100%;max-width:960px;display:flex;gap:10px;margin-bottom:12px}
    .search-input{flex:1;background:var(--surf);border:1px solid var(--border);border-radius:4px;color:var(--text);font-family:'DM Mono',monospace;font-size:13px;padding:12px 16px;outline:none;transition:border-color .2s}
    .search-input:focus{border-color:var(--red)}
    .search-input::placeholder{color:var(--muted)}
    .search-btn{background:var(--red);color:#fff;border:none;border-radius:4px;font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:.08em;padding:0 28px;cursor:pointer;white-space:nowrap}
    .search-btn:disabled{background:var(--muted);cursor:not-allowed}
    .type-toggle{width:100%;max-width:960px;display:flex;gap:8px;margin-bottom:14px}
    .toggle-btn{display:flex;align-items:center;gap:7px;background:var(--surf);border:1px solid var(--border);border-radius:4px;color:var(--muted);font-family:'DM Mono',monospace;font-size:12px;padding:8px 18px;cursor:pointer;transition:border-color .2s,color .2s}
    .toggle-btn.active{border-color:var(--red);color:var(--text);background:rgba(255,0,0,.08)}
    .error-msg{width:100%;max-width:960px;font-family:'DM Mono',monospace;font-size:12px;color:var(--red);min-height:20px;margin-bottom:8px}
    .spinner{display:none;width:100%;max-width:960px;justify-content:center;padding:20px 0}
    .spinner.show{display:flex}
    .spinner::after{content:'';width:22px;height:22px;border:2px solid var(--border);border-top-color:var(--red);border-radius:50%;animation:spin .7s linear infinite}
    .results-grid{width:100%;max-width:960px;display:grid;gap:12px;margin-bottom:20px}
    .results-grid.mode-video{grid-template-columns:repeat(4,1fr)}
    .results-grid.mode-short{grid-template-columns:repeat(5,1fr)}
    @media(max-width:700px){.results-grid.mode-video{grid-template-columns:repeat(2,1fr)}.results-grid.mode-short{grid-template-columns:repeat(3,1fr)}}
    .result-card{background:var(--surf);border:1px solid var(--border);border-radius:6px;overflow:hidden;cursor:pointer;transition:border-color .2s,transform .15s}
    .result-card:hover{border-color:var(--red);transform:translateY(-3px)}
    .thumb-wrap{width:100%;overflow:hidden;position:relative}
    .mode-video .thumb-wrap{aspect-ratio:16/9}
    .mode-short .thumb-wrap{aspect-ratio:9/16}
    .thumb-wrap img{width:100%;height:100%;object-fit:cover;display:block}
    .result-info{padding:9px 11px 11px}
    .result-title{font-size:12px;font-weight:500;line-height:1.45;margin-bottom:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .result-channel{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .load-more-wrap{width:100%;max-width:960px;display:none;justify-content:center;margin-bottom:28px}
    .load-more-wrap.show{display:flex}
    .load-more-btn{background:transparent;border:1px solid var(--border);border-radius:4px;color:var(--muted);font-family:'DM Mono',monospace;font-size:12px;padding:10px 32px;cursor:pointer}
    .load-more-btn:hover{border-color:var(--red);color:var(--text)}

    /* Player */
    .player-wrap{width:100%;max-width:960px}
    .player-box{width:100%;aspect-ratio:16/9;border:1px solid var(--border);border-radius:6px;background:#000;overflow:hidden;position:relative}

    /* Placeholder */
    #placeholder{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;color:var(--muted);z-index:1}
    #placeholder svg{width:56px;height:56px;opacity:.22}
    #placeholder p{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase}

    /* Loading overlay */
    #playerLoading{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:rgba(0,0,0,.85);z-index:3}
    #playerLoading.show{display:flex}
    .loading-ring{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--red);border-radius:50%;animation:spin .7s linear infinite}
    .loading-text{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.12em;color:var(--muted);text-transform:uppercase}

    /* Video */
    #mainVideo{position:absolute;inset:0;width:100%;height:100%;background:#000;z-index:2;display:none}
    #mainVideo.show{display:block}

    /* Controls */
    #controls{position:absolute;bottom:0;left:0;right:0;display:none;align-items:center;gap:10px;background:linear-gradient(transparent,rgba(0,0,0,.85));padding:18px 14px 10px;z-index:4;opacity:0;transition:opacity .25s}
    .player-box:hover #controls{opacity:1}
    #controls.show{display:flex}
    .ctrl-btn{background:none;border:none;color:#fff;cursor:pointer;font-size:16px;padding:4px;line-height:1}
    .ctrl-btn:hover{color:var(--red)}
    .progress-wrap{flex:1;height:4px;background:rgba(255,255,255,.2);border-radius:2px;cursor:pointer}
    .progress-fill{height:100%;background:var(--red);border-radius:2px;width:0%}
    .time-label{font-family:'DM Mono',monospace;font-size:10px;color:rgba(255,255,255,.7);white-space:nowrap}
    .vol-input{width:60px;accent-color:var(--red);cursor:pointer}

    .meta-bar{display:flex;align-items:center;justify-content:space-between;margin-top:12px;padding:0 2px}
    .vid-tag{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted)}
    .vid-tag span{color:var(--red)}
    .now-title{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:60%}

    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <header>
    <h1 class="logo">YOU<span>TUBE</span></h1>
    <p class="badge">Proxy Viewer</p>
  </header>

  <div class="search-row">
    <input id="searchInput" class="search-input" type="text" placeholder="검색어 또는 YouTube URL…" autocomplete="off"/>
    <button id="searchBtn" class="search-btn">SEARCH</button>
  </div>

  <div class="type-toggle">
    <button class="toggle-btn active" data-kind="video">🎬 VIDEO</button>
    <button class="toggle-btn" data-kind="short">⚡ SHORTS</button>
  </div>

  <p id="errorMsg" class="error-msg"></p>
  <div class="spinner" id="spinner"></div>
  <div class="results-grid mode-video" id="resultsGrid"></div>
  <div class="load-more-wrap" id="loadMoreWrap">
    <button class="load-more-btn" id="loadMoreBtn">LOAD MORE</button>
  </div>

  <div class="player-wrap">
    <div class="player-box" id="playerBox">
      <div id="placeholder">
        <svg viewBox="0 0 68 48" fill="none"><rect width="68" height="48" rx="10" fill="currentColor"/><path d="M27 16L47 24L27 32V16Z" fill="#090909"/></svg>
        <p>영상을 선택하세요</p>
      </div>
      <div id="playerLoading">
        <div class="loading-ring"></div>
        <p class="loading-text" id="loadingText">다운로드 중…</p>
      </div>
      <video id="mainVideo" preload="auto"></video>
      <div id="controls">
        <button class="ctrl-btn" id="playPauseBtn">▶</button>
        <span class="time-label" id="timeLabel">0:00 / 0:00</span>
        <div class="progress-wrap" id="progressWrap"><div class="progress-fill" id="progressFill"></div></div>
        <input class="vol-input" id="volInput" type="range" min="0" max="1" step="0.05" value="1"/>
        <button class="ctrl-btn" id="fsBtn">⛶</button>
      </div>
    </div>
    <div class="meta-bar">
      <p class="vid-tag" id="vidTag">VIDEO_ID —</p>
      <p class="now-title" id="nowTitle"></p>
    </div>
  </div>

  <script>
    const API = location.hostname === 'localhost' || location.hostname === '127.0.0.1'
      ? 'http://127.0.0.1:8000' : '';

    const $ = id => document.getElementById(id);
    const searchInput = $('searchInput'), searchBtn = $('searchBtn');
    const errorMsg = $('errorMsg'), spinner = $('spinner');
    const resultsGrid = $('resultsGrid'), loadMoreWrap = $('loadMoreWrap'), loadMoreBtn = $('loadMoreBtn');
    const placeholder = $('placeholder'), playerLoading = $('playerLoading'), loadingText = $('loadingText');
    const mainVideo = $('mainVideo'), controls = $('controls');
    const playPauseBtn = $('playPauseBtn'), timeLabel = $('timeLabel');
    const progressWrap = $('progressWrap'), progressFill = $('progressFill');
    const volInput = $('volInput'), fsBtn = $('fsBtn');
    const vidTag = $('vidTag'), nowTitle = $('nowTitle');

    let kind = 'video', query = '', nextToken = null;

    document.querySelectorAll('.toggle-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        if (btn.dataset.kind === kind) return;
        document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        kind = btn.dataset.kind;
        resultsGrid.className = `results-grid mode-${kind}`;
        if (query) { clearResults(); doSearch(query, false); }
      });
    });

    async function handleSearch() {
      const q = searchInput.value.trim();
      if (!q) return;
      errorMsg.textContent = '';
      const urlRe = /^(https?:\/\/|youtu\.?be)/i;
      const idRe  = /^[A-Za-z0-9_-]{11}$/;
      if (urlRe.test(q) || idRe.test(q)) {
        const r = await fetch(`${API}/api/parse`, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({url:q})});
        const d = await r.json();
        if (!r.ok) { errorMsg.textContent = d.detail; return; }
        clearResults();
        playVideo(d.video_id);
      } else {
        query = q; clearResults(); doSearch(q, false);
      }
    }

    async function doSearch(q, append) {
      spinner.classList.add('show'); searchBtn.disabled = true; searchBtn.textContent = 'LOADING…';
      try {
        let url = `${API}/api/search?q=${encodeURIComponent(q)}&kind=${kind}`;
        if (append && nextToken) url += `&page_token=${encodeURIComponent(nextToken)}`;
        const r = await fetch(url);
        const d = await r.json();
        if (!r.ok) { errorMsg.textContent = d.detail; return; }
        nextToken = d.next_page_token || null;
        loadMoreWrap.classList.toggle('show', !!nextToken);
        d.results.forEach(item => {
          const card = document.createElement('div');
          card.className = 'result-card';
          card.innerHTML = `<div class="thumb-wrap"><img src="${API}/api/thumbnail/${item.video_id}" loading="lazy"/></div>
            <div class="result-info"><p class="result-title">${esc(item.title)}</p><p class="result-channel">${esc(item.channel)}</p></div>`;
          card.onclick = () => playVideo(item.video_id);
          resultsGrid.appendChild(card);
        });
      } catch(e) { errorMsg.textContent = '서버 연결 실패'; }
      finally { spinner.classList.remove('show'); searchBtn.disabled = false; searchBtn.textContent = 'SEARCH'; }
    }

    loadMoreBtn.onclick = () => { if (query && nextToken) doSearch(query, true); };

    async function playVideo(videoId) {
      // Show loading
      placeholder.style.display = 'none';
      playerLoading.classList.add('show');
      loadingText.textContent = '메타데이터 가져오는 중…';
      mainVideo.classList.remove('show');
      controls.classList.remove('show');
      mainVideo.pause();
      mainVideo.removeAttribute('src');
      vidTag.innerHTML = `VIDEO_ID — <span>${videoId}</span>`;
      nowTitle.textContent = '';
      errorMsg.textContent = '';

      try {
        // Get metadata
        const r = await fetch(`${API}/api/stream-info/${videoId}`);
        const d = await r.json();
        if (!r.ok) throw new Error(d.detail);
        nowTitle.textContent = d.title;
        loadingText.textContent = '다운로드 중… (최대 60초)';

        // Set video src — backend will download then serve
        mainVideo.src = `${API}/api/stream/${videoId}`;

        await new Promise((resolve, reject) => {
          const t = setTimeout(() => reject(new Error('시간 초과')), 180000);
          mainVideo.oncanplay = () => { clearTimeout(t); resolve(); };
          mainVideo.onerror   = () => { clearTimeout(t); reject(new Error('재생 오류 코드: ' + (mainVideo.error?.code ?? '?'))); };
          mainVideo.load();
        });

        playerLoading.classList.remove('show');
        mainVideo.classList.add('show');
        controls.classList.add('show');
        mainVideo.play().catch(() => {});
        playerBox.scrollIntoView({behavior:'smooth', block:'center'});

      } catch(e) {
        errorMsg.textContent = '⚠ ' + e.message;
        playerLoading.classList.remove('show');
        placeholder.style.display = 'flex';
      }
    }

    // Controls
    function fmt(s) { if(isNaN(s))return'0:00'; return`${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`; }
    mainVideo.ontimeupdate = () => {
      progressFill.style.width = (mainVideo.duration ? mainVideo.currentTime/mainVideo.duration*100 : 0) + '%';
      timeLabel.textContent = `${fmt(mainVideo.currentTime)} / ${fmt(mainVideo.duration)}`;
    };
    mainVideo.onplay  = () => playPauseBtn.textContent = '⏸';
    mainVideo.onpause = () => playPauseBtn.textContent = '▶';
    mainVideo.onended = () => playPauseBtn.textContent = '↩';
    playPauseBtn.onclick = () => mainVideo.paused ? mainVideo.play() : mainVideo.pause();
    progressWrap.onclick = e => {
      const r = progressWrap.getBoundingClientRect();
      mainVideo.currentTime = ((e.clientX - r.left) / r.width) * mainVideo.duration;
    };
    volInput.oninput = () => mainVideo.volume = volInput.value;
    fsBtn.onclick = () => document.fullscreenElement ? document.exitFullscreen() : playerBox.requestFullscreen();

    function clearResults() { resultsGrid.innerHTML=''; nextToken=null; loadMoreWrap.classList.remove('show'); }
    function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    searchBtn.onclick = handleSearch;
    searchInput.onkeydown = e => { if(e.key==='Enter') handleSearch(); };
  </script>
</body>
</html>
