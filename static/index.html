<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YouTube Proxy Player</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --red: #ff2c2c;
      --bg: #090909;
      --panel: #121212;
      --line: #222;
      --text: #f3f3f3;
      --muted: #8a8a8a;
    }
    body {
      font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 20px 80px;
      background-image: radial-gradient(circle at 10% 10%, rgba(255,255,255,0.03), transparent 28%),
                        radial-gradient(circle at 90% 20%, rgba(255,0,0,0.06), transparent 32%),
                        linear-gradient(var(--line) 1px, transparent 1px),
                        linear-gradient(90deg, var(--line) 1px, transparent 1px);
      background-size: 140px 140px, 180px 180px, 48px 48px, 48px 48px;
    }
    header { width: 100%; max-width: 1000px; display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 28px; }
    .logo { font-family: 'Bebas Neue', sans-serif; font-size: clamp(54px, 8vw, 86px); letter-spacing: 0.03em; }
    .logo span { color: var(--red); }
    .badge { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.12em; color: var(--muted); text-transform: uppercase; }
    .pill { display: inline-flex; align-items: center; gap: 8px; border: 1px solid rgba(255,44,44,0.35); color: #ffa8a8; background: rgba(255,44,44,0.08); font-family: 'DM Mono', monospace; font-size: 10px; padding: 6px 12px; border-radius: 999px; letter-spacing: 0.08em; }

    .search-row { width: 100%; max-width: 1000px; display: flex; gap: 10px; margin-bottom: 12px; }
    .search-input { flex: 1; background: var(--panel); border: 1px solid var(--line); border-radius: 6px; color: var(--text); font-family: 'DM Mono', monospace; font-size: 13px; padding: 14px 16px; outline: none; transition: border-color .18s, box-shadow .18s; }
    .search-input::placeholder { color: var(--muted); }
    .search-input:focus { border-color: var(--red); box-shadow: 0 0 0 2px rgba(255,44,44,0.14); }
    .search-btn { background: var(--red); color: #fff; border: none; border-radius: 6px; padding: 0 28px; font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 0.08em; cursor: pointer; transition: transform .1s, background .18s; }
    .search-btn:hover { background: #d81f1f; }
    .search-btn:active { transform: translateY(1px); }
    .search-btn:disabled { background: var(--muted); cursor: not-allowed; }

    .type-toggle { width: 100%; max-width: 1000px; display: flex; gap: 8px; margin-bottom: 14px; }
    .toggle-btn { flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px; background: var(--panel); border: 1px solid var(--line); border-radius: 6px; color: var(--muted); font-family: 'DM Mono', monospace; font-size: 12px; letter-spacing: 0.08em; padding: 10px 14px; cursor: pointer; transition: color .18s, border-color .18s, background .18s; }
    .toggle-btn:hover { color: var(--text); border-color: #333; }
    .toggle-btn.active { color: var(--text); border-color: var(--red); background: rgba(255,44,44,0.08); }

    .error-msg { width: 100%; max-width: 1000px; min-height: 20px; font-family: 'DM Mono', monospace; font-size: 12px; color: var(--red); letter-spacing: 0.06em; margin-bottom: 8px; }

    .spinner { display: none; width: 100%; max-width: 1000px; justify-content: center; padding: 18px 0; }
    .spinner.show { display: flex; }
    .spinner::after { content: ""; width: 22px; height: 22px; border: 2px solid var(--line); border-top-color: var(--red); border-radius: 50%; animation: spin .7s linear infinite; }

    .results-grid { width: 100%; max-width: 1000px; display: grid; gap: 12px; margin-bottom: 20px; }
    .results-grid.mode-video { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); }
    .results-grid.mode-short { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }

    .result-card { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; overflow: hidden; cursor: pointer; transition: border-color .18s, transform .14s, box-shadow .2s; }
    .result-card:hover { border-color: var(--red); transform: translateY(-2px); box-shadow: 0 10px 30px rgba(0,0,0,0.45); }
    .thumb { width: 100%; aspect-ratio: 16/9; background: #0f0f0f; object-fit: cover; display: block; }
    .thumb.short { aspect-ratio: 9/16; }
    .result-info { padding: 10px 12px 12px; }
    .result-title { font-size: 13px; line-height: 1.4; font-weight: 600; margin-bottom: 6px; }
    .result-channel { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); letter-spacing: 0.04em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .shorts-tag { position: absolute; top: 6px; left: 6px; background: var(--red); color: #fff; font-family: 'DM Mono', monospace; font-size: 10px; padding: 2px 6px; border-radius: 999px; letter-spacing: 0.08em; }

    .thumb-wrap { position: relative; }
    .thumb-wrap::after { content: "PLAY"; position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: #fff; font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.12em; background: rgba(0,0,0,0.35); opacity: 0; transition: opacity .18s; }
    .result-card:hover .thumb-wrap::after { opacity: 1; }

    .load-more-wrap { width: 100%; max-width: 1000px; display: none; justify-content: center; margin-bottom: 28px; }
    .load-more-wrap.show { display: flex; }
    .load-more-btn { background: transparent; border: 1px solid var(--line); border-radius: 6px; color: var(--muted); font-family: 'DM Mono', monospace; font-size: 12px; letter-spacing: 0.12em; padding: 10px 28px; cursor: pointer; transition: border-color .18s, color .18s, background .18s; }
    .load-more-btn:hover { border-color: var(--red); color: var(--text); background: rgba(255,44,44,0.08); }
    .load-more-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .player-wrap { width: 100%; max-width: 1000px; }
    .player-box { position: relative; width: 100%; aspect-ratio: 16/9; border: 1px solid var(--line); border-radius: 10px; background: #000; overflow: hidden; }
    .placeholder { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; color: var(--muted); pointer-events: none; transition: opacity .28s; }
    .placeholder.hidden { opacity: 0; }
    .placeholder svg { width: 60px; height: 60px; opacity: 0.24; }
    .placeholder p { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; text-align: center; }

    .player-loading { position: absolute; inset: 0; display: none; align-items: center; justify-content: center; gap: 14px; background: rgba(0,0,0,0.78); z-index: 2; }
    .player-loading.show { display: flex; }
    .player-loading::before { content: ""; width: 34px; height: 34px; border: 3px solid var(--line); border-top-color: var(--red); border-radius: 50%; animation: spin .7s linear infinite; }
    .player-loading span { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.12em; color: var(--muted); }

    video { position: absolute; inset: 0; width: 100%; height: 100%; background: #000; opacity: 0; transition: opacity .28s; }
    video.visible { opacity: 1; }

    .controls { position: absolute; left: 0; right: 0; bottom: 0; display: none; align-items: center; gap: 12px; padding: 18px 16px; background: linear-gradient(transparent, rgba(0,0,0,0.7)); }
    .controls.visible { display: flex; }
    .ctrl-btn { background: none; border: none; color: #fff; font-family: 'DM Mono', monospace; font-size: 12px; letter-spacing: 0.08em; padding: 6px 10px; cursor: pointer; transition: color .18s; }
    .ctrl-btn:hover { color: var(--red); }
    .progress-wrap { flex: 1; height: 6px; background: rgba(255,255,255,0.2); border-radius: 3px; cursor: pointer; position: relative; overflow: hidden; }
    .progress-fill { height: 100%; width: 0%; background: var(--red); transition: width .1s linear; }
    .time-label { font-family: 'DM Mono', monospace; font-size: 11px; color: rgba(255,255,255,0.8); white-space: nowrap; }
    .vol-input { width: 80px; accent-color: var(--red); cursor: pointer; }

    .meta-bar { display: flex; align-items: center; justify-content: space-between; margin-top: 12px; padding: 0 2px; gap: 10px; }
    .meta-label { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); letter-spacing: 0.08em; white-space: nowrap; }
    .meta-label span { color: var(--red); }
    .now-playing { flex: 1; font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    @keyframes spin { to { transform: rotate(360deg); } }
    @media (max-width: 720px) {
      header { flex-direction: column; align-items: flex-start; gap: 8px; }
      .search-row { flex-direction: column; }
      .search-btn { width: 100%; height: 50px; }
      .type-toggle { flex-direction: column; }
    }
  </style>
</head>
<body>
  <header>
    <div>
      <div class="logo">YOU<span>TUBE</span></div>
      <div class="badge">Embedded Viewer / v4.0</div>
    </div>
    <div class="pill">No direct youtube.com contact</div>
  </header>

  <div class="search-row">
    <input id="searchInput" class="search-input" type="text" placeholder="Enter keywords or paste a YouTube URL" autocomplete="off" spellcheck="false" />
    <button id="searchBtn" class="search-btn">SEARCH</button>
  </div>

  <div class="type-toggle">
    <button class="toggle-btn active" data-kind="video">Video</button>
    <button class="toggle-btn" data-kind="short">Shorts</button>
  </div>

  <p id="errorMsg" class="error-msg" aria-live="polite"></p>
  <div class="spinner" id="spinner"></div>
  <div class="results-grid mode-video" id="resultsGrid"></div>
  <div class="load-more-wrap" id="loadMoreWrap">
    <button class="load-more-btn" id="loadMoreBtn">LOAD MORE</button>
  </div>

  <div class="player-wrap">
    <div class="player-box" id="playerBox">
      <div class="placeholder" id="placeholder">
        <svg viewBox="0 0 68 48" fill="none"><rect width="68" height="48" rx="10" fill="currentColor"/><path d="M27 16L47 24L27 32V16Z" fill="#090909"/></svg>
        <p>Search or paste a YouTube URL to start playback</p>
      </div>
      <div class="player-loading" id="playerLoading"><span>Fetching stream...</span></div>
      <video id="mainVideo" preload="metadata"></video>
      <div class="controls" id="controls">
        <button class="ctrl-btn" id="playPauseBtn">Play</button>
        <span class="time-label" id="timeLabel">0:00 / 0:00</span>
        <div class="progress-wrap" id="progressWrap"><div class="progress-fill" id="progressFill"></div></div>
        <input class="vol-input" id="volInput" type="range" min="0" max="1" step="0.05" value="1" title="Volume" />
        <button class="ctrl-btn" id="fsBtn">Full</button>
      </div>
    </div>
    <div class="meta-bar">
      <div class="meta-label" id="videoIdTag">VIDEO_ID: <span>---</span></div>
      <div class="now-playing" id="nowPlayingTitle"></div>
    </div>
  </div>

  <script>
    // If you're previewing via a static file server (e.g., VS Code Live Server on :5500),
    // point API calls to the FastAPI backend (default :8000). Otherwise use same origin.
    const API_BASE = (location.port === '5500') ? 'http://127.0.0.1:8000' : window.location.origin;

    const searchInput = document.getElementById('searchInput');
    const searchBtn = document.getElementById('searchBtn');
    const errorMsg = document.getElementById('errorMsg');
    const spinner = document.getElementById('spinner');
    const resultsGrid = document.getElementById('resultsGrid');
    const loadMoreWrap = document.getElementById('loadMoreWrap');
    const loadMoreBtn = document.getElementById('loadMoreBtn');
    const placeholder = document.getElementById('placeholder');
    const playerLoading = document.getElementById('playerLoading');
    const mainVideo = document.getElementById('mainVideo');
    const controls = document.getElementById('controls');
    const playPauseBtn = document.getElementById('playPauseBtn');
    const timeLabel = document.getElementById('timeLabel');
    const progressWrap = document.getElementById('progressWrap');
    const progressFill = document.getElementById('progressFill');
    const volInput = document.getElementById('volInput');
    const fsBtn = document.getElementById('fsBtn');
    const playerBox = document.getElementById('playerBox');
    const videoIdTag = document.getElementById('videoIdTag');
    const nowPlayingTitle = document.getElementById('nowPlayingTitle');
    const toggleBtns = document.querySelectorAll('.toggle-btn');

    const URL_RE = /^(https?:\/\/|youtu\.?be)/i;
    const ID_RE = /^[A-Za-z0-9_-]{11}$/;

    const state = { kind: 'video', query: '', nextPageToken: null };

    toggleBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        if (btn.dataset.kind === state.kind) return;
        toggleBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        state.kind = btn.dataset.kind;
        resultsGrid.className = `results-grid mode-${state.kind}`;
        if (state.query) { clearResults(); searchVideos(state.query, false); }
      });
    });

    async function handleSearch() {
      const q = searchInput.value.trim();
      if (!q) { showError('Enter keywords or a YouTube URL.'); return; }
      clearError();
      if (URL_RE.test(q) || ID_RE.test(q)) {
        await loadByUrl(q);
      } else {
        state.query = q;
        clearResults();
        await searchVideos(q, false);
      }
    }

    async function searchVideos(q, append) {
      setSearchLoading(true);
      try {
        let url = `${API_BASE}/api/search?q=${encodeURIComponent(q)}&kind=${state.kind}`;
        if (append && state.nextPageToken) url += `&page_token=${encodeURIComponent(state.nextPageToken)}`;
        const res = await fetch(url);
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Search failed');
        state.nextPageToken = data.next_page_token || null;
        loadMoreWrap.classList.toggle('show', !!state.nextPageToken);
        renderResults(data.results, append);
      } catch (err) {
        showError(err.message);
      } finally {
        setSearchLoading(false);
      }
    }

    function renderResults(results, append) {
      if (!results.length && !append) { showError('No results.'); return; }
      results.forEach((item, idx) => {
        const card = document.createElement('div');
        card.className = 'result-card';
        const thumbSrc = `${API_BASE}/api/thumbnail/${item.video_id}`;
        card.innerHTML = `
          <div class="thumb-wrap">
            <img class="thumb ${state.kind === 'short' ? 'short' : ''}" src="${thumbSrc}" alt="${escapeHtml(item.title)}" loading="lazy" />
            ${state.kind === 'short' ? '<span class="shorts-tag">SHORTS</span>' : ''}
          </div>
          <div class="result-info">
            <div class="result-title">${escapeHtml(item.title)}</div>
            <div class="result-channel">${escapeHtml(item.channel)}</div>
          </div>`;
        card.addEventListener('click', () => loadStream(item.video_id));
        resultsGrid.appendChild(card);
      });
    }

    loadMoreBtn.addEventListener('click', () => {
      if (state.query && state.nextPageToken) searchVideos(state.query, true);
    });

    async function loadByUrl(url) {
      setSearchLoading(true);
      try {
        const res = await fetch(`${API_BASE}/api/parse`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Could not parse URL');
        clearResults();
        await loadStream(data.video_id);
      } catch (err) {
        showError(err.message);
      } finally {
        setSearchLoading(false);
      }
    }

    async function loadStream(videoId) {
      placeholder.classList.remove('hidden');
      playerLoading.classList.add('show');
      mainVideo.classList.remove('visible');
      controls.classList.remove('visible');
      mainVideo.pause();
      mainVideo.removeAttribute('src');
      mainVideo.load();
      videoIdTag.innerHTML = `VIDEO_ID: <span>${videoId}</span>`;
      nowPlayingTitle.textContent = '';

      try {
        const res = await fetch(`${API_BASE}/api/stream-info/${videoId}`);
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Failed to fetch metadata');

        nowPlayingTitle.textContent = data.title;
        mainVideo.src = `${API_BASE}/api/stream/${videoId}`;
        mainVideo.load();
        await mainVideo.play().catch(() => {});
        mainVideo.classList.add('visible');
        controls.classList.add('visible');
        placeholder.classList.add('hidden');
        playerLoading.classList.remove('show');
      } catch (err) {
        showError(err.message);
        playerLoading.classList.remove('show');
      }
    }

    function fmtTime(totalSeconds) {
      if (Number.isNaN(totalSeconds)) return '0:00';
      const m = Math.floor(totalSeconds / 60);
      const s = Math.floor(totalSeconds % 60).toString().padStart(2, '0');
      return `${m}:${s}`;
    }

    mainVideo.addEventListener('timeupdate', () => {
      const pct = mainVideo.duration ? (mainVideo.currentTime / mainVideo.duration) * 100 : 0;
      progressFill.style.width = `${pct}%`;
      timeLabel.textContent = `${fmtTime(mainVideo.currentTime)} / ${fmtTime(mainVideo.duration)}`;
    });

    mainVideo.addEventListener('loadedmetadata', () => {
      timeLabel.textContent = `${fmtTime(mainVideo.currentTime)} / ${fmtTime(mainVideo.duration)}`;
    });

    mainVideo.addEventListener('play', () => { playPauseBtn.textContent = 'Pause'; });
    mainVideo.addEventListener('pause', () => { playPauseBtn.textContent = 'Play'; });
    mainVideo.addEventListener('ended', () => { playPauseBtn.textContent = 'Replay'; });
    mainVideo.addEventListener('error', () => {
      showError('Stream failed. This video may be blocked; try another.');
      playerLoading.classList.remove('show');
      placeholder.classList.remove('hidden');
      mainVideo.classList.remove('visible');
      controls.classList.remove('visible');
    });

    playPauseBtn.addEventListener('click', () => {
      if (mainVideo.paused || mainVideo.ended) mainVideo.play(); else mainVideo.pause();
    });

    progressWrap.addEventListener('click', e => {
      if (!mainVideo.duration) return;
      const rect = progressWrap.getBoundingClientRect();
      const pct = (e.clientX - rect.left) / rect.width;
      mainVideo.currentTime = pct * mainVideo.duration;
    });

    volInput.addEventListener('input', () => { mainVideo.volume = Number(volInput.value); });

    fsBtn.addEventListener('click', () => {
      if (!document.fullscreenElement) {
        playerBox.requestFullscreen().catch(() => {});
      } else {
        document.exitFullscreen().catch(() => {});
      }
    });

    document.addEventListener('fullscreenchange', () => {
      const inFs = !!document.fullscreenElement;
      fsBtn.textContent = inFs ? 'Exit' : 'Full';
    });

    function clearResults() {
      resultsGrid.innerHTML = '';
      state.nextPageToken = null;
      loadMoreWrap.classList.remove('show');
      clearError();
    }

    function showError(msg) { errorMsg.textContent = msg; }
    function clearError() { errorMsg.textContent = ''; }

    function setSearchLoading(on) {
      spinner.classList.toggle('show', on);
      searchBtn.disabled = on;
      searchBtn.textContent = on ? 'LOADING...' : 'SEARCH';
    }

    function escapeHtml(str) {
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    searchBtn.addEventListener('click', handleSearch);
    searchInput.addEventListener('keydown', e => { if (e.key === 'Enter') handleSearch(); });
  </script>
</body>
</html>
